name: Release

# Publishes to npm when a GitHub Release is published.
# Canonical reference: https://docs.github.com/en/actions/use-cases-and-examples/publishing-packages/publishing-nodejs-packages
#
# Required setup:
#   1. Create an npm automation token at https://www.npmjs.com/settings/<username>/tokens
#   2. Add it as a repository secret named NPM_TOKEN at
#      https://github.com/dkchar/quetz/settings/secrets/actions

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for npm provenance attestation

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
