name: Release

# Publishes to npm when a GitHub Release is published.
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# Canonical refs:
#   https://docs.npmjs.com/trusted-publishers
#   https://docs.github.com/en/actions/use-cases-and-examples/publishing-packages/publishing-nodejs-packages
#
# One-time setup (do this before the first release):
#   1. Go to https://www.npmjs.com/package/@dkchar/quetz/access
#   2. Under "Trusted Publishers" add a GitHub Actions publisher:
#        Repository owner: dkchar
#        Repository name:  quetz
#        Workflow name:    release.yml
#   3. That's it — no secret needed.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for OIDC token issuance (Trusted Publishing + provenance)

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Ensure npm supports Trusted Publishing (>=11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public
        # NODE_AUTH_TOKEN not needed — OIDC handles auth
