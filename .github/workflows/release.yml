name: Release

# Publishes to npm when a GitHub Release is published.
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# Canonical refs:
#   https://docs.npmjs.com/trusted-publishers
#   https://docs.github.com/en/actions/use-cases-and-examples/publishing-packages/publishing-nodejs-packages
#
# One-time setup (do this before the first release):
#   1. Go to https://www.npmjs.com/package/@dkchar/quetz/access
#   2. Under "Trusted Publishers" add a GitHub Actions publisher:
#        Repository owner: dkchar
#        Repository name:  quetz
#        Workflow name:    release.yml
#   3. That's it — no secret needed.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to republish (for example v0.8.12)
        required: true
        type: string

permissions:
  contents: read
  id-token: write  # Required for OIDC token issuance (Trusted Publishing + provenance)

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || format('refs/tags/{0}', inputs.tag) }}

      - name: Resolve release target
        id: release_target
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: node scripts/release-workflow.mjs resolve

      - name: Verify manual release exists
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.release_target.outputs.tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const { owner, repo } = context.repo;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              if (data.draft) {
                core.setFailed(`Release ${tag} is still a draft. Publish it before retrying npm publication.`);
                return;
              }
              core.info(`Validated GitHub release ${data.tag_name}.`);
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              core.setFailed(`Manual publish requires an existing GitHub release for ${tag}. ${message}`);
            }
          result-encoding: string

      - name: Verify package version matches tag
        env:
          RELEASE_TAG: ${{ steps.release_target.outputs.tag }}
        run: node scripts/release-workflow.mjs verify-package-version

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public
        # NODE_AUTH_TOKEN not needed — OIDC handles auth
